name: elearning_app
description: E-Learning Flutter App - Speaking Materials

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  dio: ^5.4.3+1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  video_player: ^2.8.6
  chewie: ^1.8.1
  flutter_pdfview: ^1.3.2
  file_picker: ^8.0.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.5
  url_launcher: ^6.3.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
